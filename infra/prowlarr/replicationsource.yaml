apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: prowlarr-config
spec:
  sourcePVC: prowlarr-config
  trigger:
    schedule: "0 2 * * *"
  restic:
    copyMethod: Direct
    moverSecurityContext:
      runAsUser: 0
      runAsGroup: 0
    pruneIntervalDays: 7
    repository: prowlarr-config-restic-config
    retain:
      daily: 7
      within: 3d
