apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: slskd-app
spec:
  sourcePVC: slskd-app
  trigger:
    schedule: "0 2 * * *"
  restic:
    copyMethod: Direct
    moverSecurityContext:
      runAsUser: 0
      runAsGroup: 0
    pruneIntervalDays: 7
    repository: slskd-app-restic-config
    retain:
      daily: 7
      within: 3d
