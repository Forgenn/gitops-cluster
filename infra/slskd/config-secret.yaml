apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: slskd-config
spec:
  secretStoreRef:
    name: infisical-cluster-secret-store
    kind: ClusterSecretStore
  target:
    name: slskd-config
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        slskd.yml: |
          web:
            authentication:
              api_keys:
                lidarr:
                  key: "{{ .api_key }}"
                  role: readwrite
                  cidr: 0.0.0.0/0
  data:
    - secretKey: api_key
      remoteRef:
        key: /slskd/api-key
