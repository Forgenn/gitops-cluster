# htpasswd secret for Docker CLI authentication
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: zot-htpasswd
  namespace: zot
spec:
  secretStoreRef:
    name: infisical-cluster-secret-store
    kind: ClusterSecretStore
  target:
    name: zot-htpasswd
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    # htpasswd file content (bcrypt format)
    # Generate with: htpasswd -nbB <username> <password>
    - secretKey: htpasswd
      remoteRef:
        key: /zot/htpasswd
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
  refreshInterval: 1h
---
# OIDC credentials for PocketID authentication
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: zot-oidc
  namespace: zot
spec:
  secretStoreRef:
    name: infisical-cluster-secret-store
    kind: ClusterSecretStore
  target:
    name: zot-oidc
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # Zot expects a JSON file with clientid and clientsecret
        credentials.json: |
          {
            "clientid": "{{ .clientId }}",
            "clientsecret": "{{ .clientSecret }}"
          }
    deletionPolicy: Retain
  data:
  refreshInterval: 1h
