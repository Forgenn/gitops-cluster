# F7: HPA on the backend. CPU 70% target with 1–3 replicas — this is
# what makes F4's PDB (minAvailable: 1) and F1's sync replication
# actually do something. Until traffic ramps, this sits at 1 replica;
# under load it bursts to 3.
#
# Requires metrics-server in the cluster (standard with most managed
# K8s distros — verify with `kubectl top pod -n loomie`).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: loomie-backend
  namespace: loomie
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: loomie-backend
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
