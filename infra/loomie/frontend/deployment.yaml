apiVersion: apps/v1
kind: Deployment
metadata:
  name: loomie-frontend
  namespace: loomie
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loomie-frontend
  template:
    metadata:
      labels:
        app: loomie-frontend
    spec:
      imagePullSecrets:
        - name: registry-credentials
      containers:
        - name: frontend
          image: registry.monederobox.dev/loomie/frontend:20eec1b
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: PUBLIC_API_URL
              value: "https://loomie.monederobox.dev"
            - name: PUBLIC_WS_URL
              value: "wss://loomie.monederobox.dev"
            - name: PUBLIC_FIREBASE_API_KEY
              value: "AIzaSyDgrHeUiBUxpz3KM9ht7PPPlp9f5CPBfXE"
            - name: PUBLIC_FIREBASE_AUTH_DOMAIN
              value: "loomie-ai.firebaseapp.com"
            - name: PUBLIC_FIREBASE_PROJECT_ID
              value: "loomie-ai"
            - name: PUBLIC_FIREBASE_STORAGE_BUCKET
              value: "loomie-ai.firebasestorage.app"
            - name: PUBLIC_FIREBASE_MESSAGING_SENDER_ID
              value: "66488413464"
            - name: PUBLIC_FIREBASE_APP_ID
              value: "1:66488413464:web:7782f0531ee876b3ac426d"
            - name: PUBLIC_FIREBASE_VAPID_KEY
              value: "BFchEKnxcVoK9lecKtqdYPMtvghMsIK1calKMie_d1AdfoGMjtUu6JDsYKtak0EfWFlWhIf6sq6gG0WatGKNH_U"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
