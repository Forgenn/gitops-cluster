apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: loomie-secrets
  namespace: loomie
spec:
  secretStoreRef:
    name: infisical-cluster-secret-store
    kind: ClusterSecretStore
  target:
    name: loomie-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: ANTHROPIC_API_KEY
      remoteRef:
        key: /loomie/ANTHROPIC_API_KEY
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: JWT_SECRET
      remoteRef:
        key: /loomie/JWT_SECRET
    # OIDC Configuration (from Pocket ID)
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: OIDC_CLIENT_ID
      remoteRef:
        key: /pocket-id/loomie/client-id
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: OIDC_CLIENT_SECRET
      remoteRef:
        key: /pocket-id/loomie/client-secret
    # FCM push notifications
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: FCM_SA_KEY
      remoteRef:
        key: /loomie/FCM_SA_KEY
    # Claude Code OAuth token (sk-ant-oat01-...)
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: CLAUDE_CODE_OAUTH_TOKEN
      remoteRef:
        key: /loomie/CLAUDE_CODE_OAUTH_TOKEN
    # GLM (Zhipu AI) API key
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: GLM_API_KEY
      remoteRef:
        key: /loomie/GLM_API_KEY
    # Pi sidecar -> backend auth token (static API key)
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: PI_SIDECAR_TOKEN
      remoteRef:
        key: /loomie/PI_SIDECAR_TOKEN
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    # Strava integration
    - secretKey: STRAVA_CLIENT_ID
      remoteRef:
        key: /loomie/STRAVA_CLIENT_ID
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: STRAVA_CLIENT_SECRET
      remoteRef:
        key: /loomie/STRAVA_CLIENT_SECRET
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    - secretKey: STRAVA_REDIRECT_URL
      remoteRef:
        key: /loomie/STRAVA_REDIRECT_URL
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
    # GitHub token for cloning repos into terminal environments
    - secretKey: GITHUB_TOKEN
      remoteRef:
        key: /loomie/GITHUB_TOKEN
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
  refreshInterval: 1h
