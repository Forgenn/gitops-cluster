apiVersion: apps/v1
kind: Deployment
metadata:
  name: loomie-searxng
  namespace: loomie
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loomie-searxng
  template:
    metadata:
      labels:
        app: loomie-searxng
    spec:
      # F2 / P-03: pod-level hardening (SearXNG subset). The upstream
      # searxng/searxng image runs as uid 977 with its own writable layout,
      # so we deliberately do NOT pin runAsUser / fsGroup or flip
      # readOnlyRootFilesystem here — those would break the image. Capability
      # drops + no-privilege-escalation + seccomp are still safe and apply.
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: searxng
          image: searxng/searxng:latest
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /etc/searxng/settings.yml
              subPath: settings.yml
            - name: config
              mountPath: /etc/searxng/limiter.toml
              subPath: limiter.toml
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: searxng-config
