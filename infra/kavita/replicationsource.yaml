apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: kavita-config
spec:
  sourcePVC: kavita-config
  trigger:
    schedule: "0 2 * * *"
  restic:
    copyMethod: Direct
    pruneIntervalDays: 7
    repository: kavita-config-restic-config
    retain:
      daily: 7
      within: 3d
