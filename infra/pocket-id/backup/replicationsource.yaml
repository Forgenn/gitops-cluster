apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: pocket-id-pvc
spec:
  sourcePVC: pocket-id-data-pocket-id-0
  trigger:
    schedule: "0 8 * * *"
  restic:
    copyMethod: Direct
    pruneIntervalDays: 14
    repository: pocket-id-restic-config
    moverSecurityContext:
      runAsUser: 1000
      runAsGroup: 1000
      fsGroup: 1000
    retain:
      daily: 14
      within: 3d
