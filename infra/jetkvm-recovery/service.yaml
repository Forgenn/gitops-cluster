# Service with NO selector + manual endpoint -> points the gateway at the
# JetKVM's LAN IP. (Cluster nodes are on 192.168.1.0/24, so pods/gateway can
# reach it.) Replace 192.168.1.172 with the IP shown on the JetKVM's screen.
apiVersion: v1
kind: Service
metadata:
  name: jetkvm
  namespace: jetkvm-recovery
spec:
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: jetkvm-1
  namespace: jetkvm-recovery
  labels:
    kubernetes.io/service-name: jetkvm
addressType: IPv4
ports:
  - name: http
    port: 80
    protocol: TCP
endpoints:
  - addresses:
      - "192.168.1.172"
