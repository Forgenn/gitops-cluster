apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cnpg-secret-reader
  namespace: immich
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames: ["hetzner-backup-bucket-credentials"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cnpg-secret-reader-binding
  namespace: immich
subjects:
  - kind: ServiceAccount
    name: immich-db
    namespace: immich
roleRef:
  kind: Role
  name: cnpg-secret-reader
  apiGroup: rbac.authorization.k8s.io
