apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: immich

resources:
  - namespace.yaml
  - database/
  - library-pvc.yaml
  - restic-config.yaml
  - backup.yaml
  - httproute.yaml

helmCharts:
  - name: immich
    repo: oci://ghcr.io/immich-app/immich-charts
    releaseName: immich
    version: "0.10.3"
    namespace: immich
    valuesFile: values/values.yaml
