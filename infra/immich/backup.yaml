apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: immich-library-backup
  namespace: immich
spec:
  sourcePVC: immich-library
  trigger:
    schedule: "0 8 * * *"
  restic:
    copyMethod: Direct
    pruneIntervalDays: 7
    unlock: unlock
    repository: restic-config
    cacheCapacity: 2Gi
    retain:
      daily: 7
      weekly: 4
      monthly: 6
      yearly: 1
